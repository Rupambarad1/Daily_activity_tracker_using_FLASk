<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Daily Activity Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0d0f14; --surface:#13161e; --surface-2:#1a1e29;
      --border:#252a38; --accent:#4f8ef7; --accent-glow:rgba(79,142,247,0.18);
      --accent-2:#38d9a9; --text-1:#eef0f5; --text-2:#8b91a8; --text-3:#555d78;
      --danger:#f76f6f; --radius:14px; --radius-sm:8px;
      --shadow:0 4px 32px rgba(0,0,0,0.55);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text-1);
      font-family:'DM Sans',sans-serif; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background-image:
        linear-gradient(#1e2330 1px,transparent 1px),
        linear-gradient(90deg,#1e2330 1px,transparent 1px);
      background-size:40px 40px;
    }
    .login-wrap {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); box-shadow:var(--shadow);
      padding:44px 40px 40px; width:380px;
      animation:pop .4s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes pop {
      from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)}
    }
    .login-logo {
      display:flex; align-items:center; gap:10px; margin-bottom:32px;
    }
    .logo-dot {
      width:10px; height:10px; border-radius:50%; background:var(--accent);
      box-shadow:0 0 14px var(--accent);
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{box-shadow:0 0 8px var(--accent)} 50%{box-shadow:0 0 22px var(--accent)}
    }
    .logo-name {
      font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--text-1);
    }
    .logo-sub { font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; }
    h2 { font-size:22px; font-weight:700; margin-bottom:6px; }
    .sub { font-size:13px; color:var(--text-3); margin-bottom:28px; }
    .field { display:flex; flex-direction:column; gap:7px; margin-bottom:18px; }
    label {
      font-size:12px; font-weight:600; color:var(--text-2);
      text-transform:uppercase; letter-spacing:.05em;
    }
    input {
      background:var(--surface-2); border:1px solid var(--border);
      border-radius:var(--radius-sm); color:var(--text-1);
      font-family:'DM Sans',sans-serif; font-size:15px;
      padding:11px 14px; outline:none;
      transition:border-color .2s,box-shadow .2s; width:100%;
    }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    .error-msg {
      background:rgba(247,111,111,.1); border:1px solid rgba(247,111,111,.3);
      border-radius:var(--radius-sm); color:var(--danger);
      font-size:13px; padding:10px 14px; margin-bottom:16px;
    }
    .btn-login {
      width:100%; background:var(--accent); color:#fff;
      font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600;
      border:none; border-radius:var(--radius-sm); padding:13px;
      cursor:pointer; transition:background .2s,transform .2s,box-shadow .2s;
      display:flex; align-items:center; justify-content:center; gap:8px;
      margin-top:8px;
    }
    .btn-login:hover {
      background:#6ba3f9; transform:translateY(-1px);
      box-shadow:0 6px 20px rgba(79,142,247,.38);
    }
    .theme-hint { text-align:center; margin-top:20px; font-size:12px; color:var(--text-3); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <span class="logo-dot"></span>
      <div>
        <div class="logo-name">DAT</div>
        <div class="logo-sub">Daily Activity Tracker</div>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p class="sub">Sign in to access your team dashboard</p>

    {% if error %}
      <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <button class="btn-login" type="submit">Sign In →</button>
    </form>

    <p class="theme-hint">Ford Internal · Team Access Only</p>
  </div>
</body>
</html>
